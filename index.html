<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Looper</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#020101">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Looper">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #020101;
    --cream: #f3ead9;
    --cream-dim: #a89985;
    --mono-dim: #6b5c49;
    --sq-0: #1c140c;
    --accent: #ff8a3d;
    --radius: 28px;
    --tr: 255; --tg: 138; --tb: 61;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  body{
    min-height:100%;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    background:
      radial-gradient(circle at 18% 12%, rgba(255,138,61,0.07), transparent 42%),
      radial-gradient(circle at 85% 15%, rgba(255,90,40,0.04), transparent 45%),
      radial-gradient(circle at 75% 90%, rgba(181,85,28,0.05), transparent 50%),
      var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    font-family:'JetBrains Mono', monospace;
    color:var(--cream);
  }

  .card{
    width:100%;
    height:100%;
    max-width:none;
    background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    backdrop-filter: blur(18px) saturate(135%);
    -webkit-backdrop-filter: blur(18px) saturate(135%);
    border:none;
    border-radius:0;
    padding:36px 32px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 0 60px rgba(255,255,255,0.015);
    position:relative;
    overflow:hidden;
    contain:paint;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    touch-action: none;
    outline: none;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-120px; right:-120px;
    width:280px; height:280px;
    background: radial-gradient(circle, rgba(255,138,61,0.18), transparent 70%);
    pointer-events:none;
  }

  /* ---------- digit matrix ---------- */
  .digit-display{
    --cell: clamp(22px, 9.9vmin, 53px);
    --gap: clamp(4.2px, 1.21vmin, 10px);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap: clamp(11px, 2.9vmin, 22px);
    margin:8px auto 20px;
  }
  .digit-display.compact{ --cell: 15px; --gap: 4px; }
  .digit-display.message-mode{
    --cell: 10px;
    --gap: 2px;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .digit{
    position:relative;
    width: calc(3*var(--cell) + 2*var(--gap));
    height: calc(5*var(--cell) + 4*var(--gap));
    flex-shrink:0;
  }
  .digit .bgpx, .digit .tok{
    position:absolute;
    width:var(--cell);
    height:var(--cell);
    border-radius:4px;
    transform: translate(
      calc(var(--col) * (var(--cell) + var(--gap))),
      calc(var(--row) * (var(--cell) + var(--gap)))
    );
  }
  .digit .bgpx{ background: var(--sq-0); }
  .digit .tok{
    background: rgb(var(--tr) var(--tg) var(--tb));
    box-shadow:
      0 0 6px 1px rgba(var(--tr), var(--tg), var(--tb), 0.505),
      0 0 18px 4px rgba(var(--tr), var(--tg), var(--tb), 0.281),
      0 0 34px 10px rgba(var(--tr), var(--tg), var(--tb), 0.123);
    transition:
      transform .5s cubic-bezier(.22,1,.36,1),
      box-shadow .4s ease,
      opacity .35s ease;
  }
  .digit .tok.spawn{ animation: pixelIgnite .5s cubic-bezier(.22,1,.36,1); }
  .digit .tok.leaving{ opacity:0; }
  @keyframes pixelIgnite{
    0%{ box-shadow:0 0 0 0 rgba(var(--tr), var(--tg), var(--tb), 0); transform-origin:center; transform: translate(calc(var(--col) * (var(--cell) + var(--gap))), calc(var(--row) * (var(--cell) + var(--gap)))) scale(0.5); }
    55%{ box-shadow:0 0 30px 10px rgba(var(--tr), var(--tg), var(--tb), 0.364); transform: translate(calc(var(--col) * (var(--cell) + var(--gap))), calc(var(--row) * (var(--cell) + var(--gap)))) scale(1.1); }
    100%{ transform: translate(calc(var(--col) * (var(--cell) + var(--gap))), calc(var(--row) * (var(--cell) + var(--gap)))) scale(1); }
  }

  .colon{
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:var(--gap);
    height: calc(5*var(--cell) + 4*var(--gap));
    flex-shrink:0;
  }
  .colon .px{
    width:var(--cell);
    height:var(--cell);
    border-radius:4px;
    background: var(--sq-0);
  }
  .colon .px.on{
    background: rgb(var(--tr) var(--tg) var(--tb));
    box-shadow: 0 0 6px 1px rgba(var(--tr), var(--tg), var(--tb), 0.505), 0 0 16px 4px rgba(var(--tr), var(--tg), var(--tb), 0.224);
  }

  .message-row{
    display:flex;
    justify-content:center;
    gap:var(--gap);
  }

  .timer-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    transform-origin:center center;
  }

  .timer-row{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap: clamp(10px, 2vmin, 18px);
    margin:8px auto 12px;
    transform: translateX(-32px);
  }
  .timer-row .digit-display{ margin:0; }

  .digit-display.ms-pixels{
    --cell: clamp(10px, 3.9vmin, 24px);
    --gap: clamp(2.3px, 0.55vmin, 4.2px);
    gap: clamp(4.2px, 1.1vmin, 8.5px);
  }
  /* the ms display updates far more often than the main timer, so it skips
     the transform/box-shadow transitions and spawn animation entirely --
     those are the expensive part, and at this update rate they'd just be
     interrupting each other anyway. */
  .digit-display.ms-pixels .tok{
    transition:none;
    box-shadow: 0 0 8px 2px rgba(var(--tr), var(--tg), var(--tb), 0.4);
  }
  .digit-display.ms-pixels .tok.spawn{ animation:none; }
  .digit-display.ms-pixels .tok.leaving{ display:none; }

  .progress-track{
    width:100%;
    max-width:100%;
    height:4px;
    margin:0 auto 26px;
    background: rgba(255,255,255,0.06);
    border-radius:4px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:100%;
    background: rgb(var(--tr) var(--tg) var(--tb));
    border-radius:4px;
    transition: width 0.3s linear, background 0.4s linear;
  }

  /* ---------- lap markers (recorded via double-tap) ---------- */
  .lap-panel{
    position:absolute;
    left:16px;
    bottom:16px;
    max-width:42%;
    max-height:32%;
    overflow-y:auto;
    padding:10px 14px;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    opacity:0;
    transform:translateY(8px);
    transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
    z-index:5;
  }
  .lap-panel.visible{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .lap-list{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .lap-row{
    display:flex;
    justify-content:space-between;
    gap:14px;
    font-size:clamp(11px, 1.6vmin, 14px);
    color:rgba(255,255,255,0.75);
    font-variant-numeric: tabular-nums;
    white-space:nowrap;
  }
  .lap-index{
    opacity:0.55;
    font-weight:600;
  }
  .lap-time{
    font-weight:500;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:12px;
  }
  .controls button{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:12px 22px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color:var(--cream);
    cursor:pointer;
    transition:.15s;
  }
  .controls button.primary{
    background:rgb(var(--tr) var(--tg) var(--tb));
    color:#1a0f06;
    border-color:rgb(var(--tr) var(--tg) var(--tb));
    font-weight:700;
  }
  .controls button:hover{ filter:brightness(1.12); }
  .controls button:active{ transform:scale(0.96); }

  @media (max-width:420px){
    .card{ padding:28px 18px; }
    .digit-display{ gap:8px; }
    .digit-display.compact{ --cell: 11px; --gap: 2px; gap:6px; }
    .digit-display.message-mode{ --cell: 8px; --gap: 2px; }
  }

  /* ---------- force landscape on mobile ---------- */
  @media screen and (max-width: 900px) and (orientation: portrait){
    html{
      transform: rotate(90deg);
      transform-origin: left top;
      width: 100vh;
      height: 100vw;
      overflow-x: hidden;
      position: absolute;
      top: 0;
      left: 100%;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="timer-wrap" id="timerWrap">
    <div class="timer-row">
      <div class="digit-display" id="digitDisplay"></div>
      <div class="digit-display ms-pixels" id="msDisplay"></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="lap-panel" id="lapPanel">
    <div class="lap-list" id="lapList"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const FONT = {
    "0":["111","101","101","101","111"],
    "1":["010","010","010","010","010"],
    "2":["111","001","111","100","111"],
    "3":["111","001","111","001","111"],
    "4":["101","101","111","001","001"],
    "5":["111","100","111","001","111"],
    "6":["111","100","111","101","111"],
    "7":["111","001","001","001","001"],
    "8":["111","101","111","101","111"],
    "9":["111","101","111","001","111"],
    "T":["111","010","010","010","010"],
    "I":["111","010","010","010","111"],
    "M":["101","111","111","101","101"],
    "E":["111","100","111","100","111"],
    "N":["101","111","111","111","101"],
    "D":["110","101","101","101","110"]
  };
  const COLON = ["0","1","0","1","0"];

  const digitDisplay = document.getElementById("digitDisplay");
  const msDisplay = document.getElementById("msDisplay");
  const card = document.querySelector(".card");
  const progressFill = document.getElementById("progressFill");
  const timerRow = document.querySelector(".timer-row");
  const progressTrack = document.querySelector(".progress-track");
  const timerWrap = document.getElementById("timerWrap");
  const lapPanel = document.getElementById("lapPanel");
  const lapList = document.getElementById("lapList");

  function syncProgressTrackWidth(){
    const w = timerRow.offsetWidth;
    if(w > 0) progressTrack.style.width = w + "px";
  }

  /* ---------- scale the whole timer block to fill ~80% of the screen ----------
     Works for any digit count (MM:SS vs H:MM:SS), the "TIME ENDED" message,
     and both the normal and rotated (forced-landscape) layouts, because it
     measures real rendered pixels rather than guessing from viewport units. */
  const FIT_FRACTION = 0.8;
  let fitRaf = null;

  function fitTimerToScreen(){
    if(!timerWrap) return;
    // reset to natural scale first so we measure the un-scaled size
    timerWrap.style.transform = "scale(1)";
    const naturalW = timerWrap.offsetWidth;
    const naturalH = timerWrap.offsetHeight;
    if(naturalW === 0 || naturalH === 0) return;

    const cardStyle = getComputedStyle(card);
    const padX = parseFloat(cardStyle.paddingLeft) + parseFloat(cardStyle.paddingRight);
    const padY = parseFloat(cardStyle.paddingTop) + parseFloat(cardStyle.paddingBottom);
    const canvasW = Math.max(0, card.clientWidth - padX);
    const canvasH = Math.max(0, card.clientHeight - padY);
    if(canvasW === 0 || canvasH === 0) return;

    const targetW = canvasW * FIT_FRACTION;
    const targetH = canvasH * FIT_FRACTION;

    const scale = Math.min(targetW / naturalW, targetH / naturalH);
    timerWrap.style.transform = "scale(" + scale + ")";
  }

  function scheduleFit(){
    if(fitRaf) cancelAnimationFrame(fitRaf);
    fitRaf = requestAnimationFrame(() => { fitRaf = null; fitTimerToScreen(); syncProgressTrackWidth(); });
  }

  window.addEventListener("resize", scheduleFit);
  window.addEventListener("orientationchange", () => setTimeout(scheduleFit, 50));

  /* ---------- glyph helpers ---------- */
  function litCells(ch){
    const rows = FONT[ch];
    const cells = [];
    for(let r=0;r<5;r++){
      for(let c=0;c<3;c++){
        if(rows[r][c] === "1") cells.push([r,c]);
      }
    }
    return cells;
  }

  function buildGlyphGrid(ch){
    const wrap = document.createElement("div");
    wrap.className = "digit";
    wrap.dataset.char = ch;
    for(let r=0;r<5;r++){
      for(let c=0;c<3;c++){
        const bg = document.createElement("div");
        bg.className = "bgpx";
        bg.style.setProperty("--row", r);
        bg.style.setProperty("--col", c);
        wrap.appendChild(bg);
      }
    }
    litCells(ch).forEach(([r,c]) => {
      const tok = document.createElement("div");
      tok.className = "tok";
      tok.style.setProperty("--row", r);
      tok.style.setProperty("--col", c);
      wrap.appendChild(tok);
    });
    return wrap;
  }

  function buildColonGrid(){
    const wrap = document.createElement("div");
    wrap.className = "colon";
    COLON.forEach(v => {
      const px = document.createElement("div");
      px.className = "px" + (v === "1" ? " on" : "");
      wrap.appendChild(px);
    });
    return wrap;
  }

  // Morphs a digit cell from its current value to `newCh`: pixels that exist
  // in both shapes stay put or slide to the nearest spot still needed, only
  // the leftover difference fades out / spawns in.
  function updateDigitGrid(el, newCh){
    if(el.dataset.char === newCh) return;
    el.dataset.char = newCh;

    const tokens = Array.from(el.querySelectorAll(".tok:not(.leaving)"));
    const oldPositions = tokens.map(t => ({
      r: parseInt(t.style.getPropertyValue("--row"), 10),
      c: parseInt(t.style.getPropertyValue("--col"), 10),
      el: t,
      used: false
    }));
    const newPositions = litCells(newCh).map(([r,c]) => ({ r, c, used:false }));

    // 1) keep exact matches in place
    oldPositions.forEach(op => {
      if(op.used) return;
      const exact = newPositions.find(np => !np.used && np.r === op.r && np.c === op.c);
      if(exact){ exact.used = true; op.used = true; }
    });

    // 2) slide remaining old tokens to the nearest still-needed spot
    oldPositions.filter(op => !op.used).forEach(op => {
      let best = null, bestDist = Infinity;
      newPositions.forEach(np => {
        if(np.used) return;
        const d = Math.abs(np.r - op.r) + Math.abs(np.c - op.c);
        if(d < bestDist){ bestDist = d; best = np; }
      });
      if(best){
        best.used = true;
        op.used = true;
        op.el.style.setProperty("--row", best.r);
        op.el.style.setProperty("--col", best.c);
      }
    });

    // 3) truly unneeded old tokens fade out and get removed
    oldPositions.filter(op => !op.used).forEach(op => {
      op.el.classList.add("leaving");
      setTimeout(() => op.el.remove(), 400);
    });

    // 4) positions the new shape needs that nothing could slide into: spawn fresh
    newPositions.filter(np => !np.used).forEach(np => {
      const tok = document.createElement("div");
      tok.className = "tok spawn";
      tok.style.setProperty("--row", np.r);
      tok.style.setProperty("--col", np.c);
      el.appendChild(tok);
    });
  }

  function renderMessage(lines){
    digitDisplay.classList.remove("compact");
    digitDisplay.classList.add("message-mode");
    digitDisplay.innerHTML = "";
    lines.forEach(line => {
      const row = document.createElement("div");
      row.className = "message-row";
      for(const ch of line){
        row.appendChild(buildGlyphGrid(ch));
      }
      digitDisplay.appendChild(row);
    });
    scheduleFit();
  }

  function renderDigits(str){
    digitDisplay.classList.remove("message-mode");
    const chars = str.split("");
    digitDisplay.classList.toggle("compact", chars.length > 5);

    if(digitDisplay.children.length !== chars.length){
      digitDisplay.innerHTML = "";
      chars.forEach(ch => digitDisplay.appendChild(ch === ":" ? buildColonGrid() : buildGlyphGrid(ch)));
      scheduleFit();
      return;
    }

    chars.forEach((ch, i) => {
      if(ch === ":") return; // colon is static, never changes
      updateDigitGrid(digitDisplay.children[i], ch);
    });
  }

  /* ---------- independent digit model ----------
     Each place (hours-tens, hours-ones, minutes-tens, ...) is its own value
     that wraps within its own range and never carries into its neighbor.
     Only minutes-tens and seconds-tens are capped at 5 (since 60 minutes/
     seconds roll over); everything else goes 0-9. The ms group is 3 digits
     (hundreds/tens/ones of a millisecond) for true 1ms resolution. */
  const DIGIT_MAX = { hT:9, hO:9, mT:5, mO:9, sT:5, sO:9, msH:9, msT:9, msO:9 };

  function digitsToMs(d){
    const h = d.hT*10 + d.hO;
    const m = d.mT*10 + d.mO;
    const s = d.sT*10 + d.sO;
    const ms = d.msH*100 + d.msT*10 + d.msO;
    return (((h*3600) + (m*60) + s) * 1000) + ms;
  }

  // Only used to decompose a REAL countdown/stopwatch value (while running)
  // into digits for display -- this is where normal carry/borrow is expected
  // and correct (00 seconds borrows a minute, etc).
  function msToDigits(ms){
    ms = Math.max(0, Math.round(ms));
    const msPart = ms % 1000;
    let totalSec = Math.floor(ms / 1000);
    const s = totalSec % 60; totalSec = Math.floor(totalSec / 60);
    const m = totalSec % 60; totalSec = Math.floor(totalSec / 60);
    const h = Math.min(99, totalSec);
    return {
      hT: Math.floor(h/10), hO: h%10,
      mT: Math.floor(m/10), mO: m%10,
      sT: Math.floor(s/10), sO: s%10,
      msH: Math.floor(msPart/100), msT: Math.floor((msPart%100)/10), msO: msPart%10
    };
  }

  function formatDigitsString(d){
    const showHours = d.hT > 0 || d.hO > 0;
    let str = "";
    if(showHours) str += "" + d.hT + d.hO + ":";
    str += "" + d.mT + d.mO + ":" + d.sT + d.sO;
    return str;
  }

  // which slots are shown in digitDisplay right now, left to right
  function currentSlotOrder(){
    return (digits.hT > 0 || digits.hO > 0)
      ? ["hT","hO","mT","mO","sT","sO"]
      : ["mT","mO","sT","sO"];
  }

  /* ---------- timer state ---------- */
  const DURATIONS = { focus: 25*60*1000, short: 5*60*1000, long: 15*60*1000, custom: 90*60*1000 }; // milliseconds
  const LABELS = { focus: "Focus session", short: "Short break", long: "Long break", custom: "Custom session" };
  let mode = "focus";
  let digits = msToDigits(DURATIONS.focus);
  let remainingMs = DURATIONS.focus;
  let running = false;
  let finished = false;

  /* ---------- stopwatch mode ----------
     If every digit is 00 when the timer is started, it counts UP
     indefinitely instead of counting down -- a plain stopwatch. This is
     decided once per "session" (see clearSession below) and preserved
     across pause/resume within that session. null = not yet decided. */
  let stopwatchMode = null;

  /* ---------- lap markers (double-tap) ----------
     Recorded while a session is running; cleared whenever the session ends
     (timer finishes) or a new duration is configured. */
  let laps = [];

  // Ends the current "session": clears laps and lets the next start decide
  // fresh whether it's a countdown or a stopwatch.
  function clearSession(){
    laps = [];
    stopwatchMode = null;
    renderLaps();
  }

  function formatLapLabel(){
    const main = formatDigitsString(digits) || "00:00"; // current h/m/s reading
    const ms = "" + digits.msH + digits.msT + digits.msO;
    return main + "." + ms;
  }

  function recordLap(){
    laps.unshift({ label: formatLapLabel() });
    if(laps.length > 30) laps.length = 30; // reasonable cap
    renderLaps();
    playTick(1);
  }

  function renderLaps(){
    if(!lapList || !lapPanel) return;
    lapList.innerHTML = "";
    if(laps.length === 0){
      lapPanel.classList.remove("visible");
      return;
    }
    lapPanel.classList.add("visible");
    const total = laps.length;
    laps.forEach((lap, i) => {
      const row = document.createElement("div");
      row.className = "lap-row";
      const idx = document.createElement("span");
      idx.className = "lap-index";
      idx.textContent = "#" + (total - i);
      const time = document.createElement("span");
      time.className = "lap-time";
      time.textContent = lap.label;
      row.appendChild(idx);
      row.appendChild(time);
      lapList.appendChild(row);
    });
  }

  /* ---------- per-minute beep alert ----------
     Every time a new whole-minute segment begins (e.g. 55:00, then 54:00,
     then 53:00 ...), that minute's numeric value (mm) becomes the beep
     interval for the next 60 seconds of countdown: a short beep plays every
     mm seconds of elapsed time within that segment, restarting the count
     each time a new minute segment begins. */
  let periodAnchor = Math.floor(remainingMs/1000);   // whole seconds remaining at the start of the current minute segment
  let periodMM = Math.floor(periodAnchor / 60);     // that segment's minute value = beep interval in seconds
  let lastWholeSecond = periodAnchor;                // used to detect when a whole second boundary is crossed

  function startBeepPeriod(){
    periodAnchor = Math.floor(remainingMs/1000);
    periodMM = Math.floor(periodAnchor / 60);
    lastWholeSecond = periodAnchor;
  }

  /* ---------- screen wake lock (keep screen on while timer runs) ---------- */
  let wakeLock = null;

  async function acquireWakeLock(){
    if(!('wakeLock' in navigator)) return; // unsupported browser, fail silently
    try{
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }catch(err){
      wakeLock = null; // e.g. denied, low battery, or not in foreground — nothing we can do
    }
  }

  function releaseWakeLock(){
    if(wakeLock){
      wakeLock.release();
      wakeLock = null;
    }
  }

  // Wake locks are auto-released by the browser when the tab/app is hidden.
  // Re-acquire on return if the timer is still running.
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible' && running && !wakeLock){
      acquireWakeLock();
    }
  });
  let engineIntervalId = null;
  let countdownStartPerf = 0;
  let countdownStartMs = 0;

  const START_RGB = [255, 138, 61]; // orange, full time remaining
  const END_RGB = [224, 40, 40];    // red, reached once 85% of time is used up
  const RED_AT_ELAPSED = 0.85;

  function updateTimerColor(elapsedFraction){
    const t = Math.max(0, Math.min(1, elapsedFraction / RED_AT_ELAPSED));
    const r = Math.round(START_RGB[0] + (END_RGB[0]-START_RGB[0]) * t);
    const g = Math.round(START_RGB[1] + (END_RGB[1]-START_RGB[1]) * t);
    const b = Math.round(START_RGB[2] + (END_RGB[2]-START_RGB[2]) * t);
    const root = document.documentElement.style;
    root.setProperty("--tr", r);
    root.setProperty("--tg", g);
    root.setProperty("--tb", b);
  }

  function updateDisplay(){
    renderDigits(formatDigitsString(digits));
    renderMsDigits("" + digits.msH + digits.msT + digits.msO);
    if(stopwatchMode){
      // no configured total to measure progress against
      progressFill.style.width = "0%";
    } else {
      const total = DURATIONS[mode] || 1;
      const elapsedFraction = 1 - (remainingMs/total);
      updateTimerColor(elapsedFraction);
      progressFill.style.width = ((remainingMs/total)*100) + "%";
    }
    syncProgressTrackWidth();
  }

  function renderMsDigits(str){
    const chars = str.split("");
    if(msDisplay.children.length !== chars.length){
      msDisplay.innerHTML = "";
      chars.forEach(ch => msDisplay.appendChild(buildGlyphGrid(ch)));
      scheduleFit();
      return;
    }
    chars.forEach((ch, i) => updateDigitGrid(msDisplay.children[i], ch));
  }

  // Called once per whole-second boundary crossed while running. Fires
  // playBeep() at elapsed = mm, 2*mm, 3*mm ... seconds within the current
  // minute segment (mm = that segment's minute value), then rolls over to
  // a new segment (new mm) once 60 seconds have elapsed since it began.
  // If the segment is under a minute (mm = 0), beep every second instead.
  // (Only used in countdown mode -- a stopwatch has no minute segments to
  // count down through.)
  function checkBeep(remainingWholeSeconds){
    let elapsed = periodAnchor - remainingWholeSeconds;
    if(elapsed >= 60){
      periodAnchor = remainingWholeSeconds;
      periodMM = Math.floor(periodAnchor / 60);
      elapsed = 0;
    }
    if(elapsed <= 0) return;
    if(periodMM <= 0){
      playBeep(); // under a minute left in this segment: beep every second
      return;
    }
    if(elapsed % periodMM === 0){
      playBeep();
    }
  }

  // Single engine loop, throttled to 20fps for render cost, but the actual
  // remaining/elapsed time is computed from real elapsed time
  // (performance.now()) each tick rather than just decrementing a counter --
  // this drives the ms digits for real and avoids setInterval drift.
  // Counts down normally, or up indefinitely in stopwatch mode.
  function engineTick(){
    const elapsedMs = performance.now() - countdownStartPerf;
    const newMs = stopwatchMode ? (countdownStartMs + elapsedMs) : (countdownStartMs - elapsedMs);

    if(!stopwatchMode && newMs <= 0){
      stopEngine();
      running = false;
      finished = true;
      remainingMs = 0;
      digits = msToDigits(0);
      releaseWakeLock();
      updateTimerColor(1); // lock to full red
      progressFill.style.width = "0%";
      renderMessage(["TIME", "ENDED"]);
      clearSession(); // session over: laps clear, next start re-decides mode
      return;
    }

    remainingMs = newMs;
    digits = msToDigits(remainingMs); // running: normal carry is correct here

    if(!stopwatchMode){
      const wholeSecond = Math.floor(remainingMs / 1000);
      while(lastWholeSecond > wholeSecond){
        lastWholeSecond--;
        checkBeep(lastWholeSecond);
      }
    }

    updateDisplay();
  }

  function startEngine(){
    countdownStartPerf = performance.now();
    countdownStartMs = remainingMs;
    clearInterval(engineIntervalId);
    engineIntervalId = setInterval(engineTick, 50);
  }

  function stopEngine(){
    clearInterval(engineIntervalId);
    engineIntervalId = null;
  }

  function toggleTimer(){
    if(finished){
      finished = false;
      digits = msToDigits(DURATIONS[mode]);
      remainingMs = DURATIONS[mode];
      updateDisplay();
      running = true;
      if(stopwatchMode == null) stopwatchMode = (remainingMs === 0);
      if(stopwatchMode) updateTimerColor(0);
      startBeepPeriod();
      startEngine();
      acquireWakeLock();
      return;
    }
    if(running){
      running = false;
      stopEngine();
      releaseWakeLock();
    } else {
      running = true;
      if(stopwatchMode == null) stopwatchMode = (remainingMs === 0);
      if(stopwatchMode) updateTimerColor(0);
      startBeepPeriod();
      startEngine();
      acquireWakeLock();
    }
  }

  /* ---------- swipe up/down on a digit to set its value ---------- */
  const SWIPE_STEP_PX = 36; // px of drag per increment

  let audioCtx = null;
  function getAudioCtx(){
    if(!audioCtx){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(Ctx) audioCtx = new Ctx();
    }
    if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  // short square-wave "retro" blip: higher pitch going up, lower going down
  function playTick(direction){
    const ctx = getAudioCtx();
    if(!ctx) return;
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(direction > 0 ? 660 : 330, t0);
    osc.frequency.linearRampToValueAtTime(direction > 0 ? 880 : 220, t0 + 0.07);
    gain.gain.setValueAtTime(0.09, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.09);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + 0.1);
  }

  // small noise burst used as a percussive "thump" under the beep tone
  function playNoiseBurst(dur, gainPeak, startOffset){
    const ctx = getAudioCtx();
    if(!ctx) return;
    const t0 = ctx.currentTime + (startOffset || 0);
    const bufferSize = ctx.sampleRate * dur;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i = 0; i < bufferSize; i++){
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(gainPeak, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start(t0);
  }

  // "bomb-timer" beep: low sharp blip with a hard thump underneath
  function playBeep(){
    const ctx = getAudioCtx();
    if(!ctx) return;
    playNoiseBurst(0.04, 0.4, 0);
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(500, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.55, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.09);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + 0.1);
  }

  // Adjusts exactly one digit slot, wrapping within its own range (0-9, or
  // 0-5 for the tens-of-minutes/tens-of-seconds slots). Never touches any
  // other slot -- this is what keeps digits fully independent while setting.
  function adjustDigitSlot(slot, steps){
    if(!slot || !steps) return;
    const range = DIGIT_MAX[slot] + 1;
    const next = ((digits[slot] + steps) % range + range) % range;
    if(next === digits[slot]) return;
    digits[slot] = next;
    remainingMs = digitsToMs(digits);
    DURATIONS[mode] = remainingMs; // keep the bar's "full" reference in sync while configuring
    clearSession(); // a new duration is being set -- old laps/mode no longer apply
    updateDisplay();
    playTick(steps > 0 ? 1 : -1);
  }

  // Maps a tapped .digit cell to its slot name, whether it's in the main
  // h/m/s display (whose slot order shifts depending on whether hours are
  // shown) or the always-three-cell ms display.
  function slotForDigitCell(el){
    if(msDisplay.contains(el)){
      const cells = Array.from(msDisplay.children).filter(c => c.classList.contains("digit"));
      const idx = cells.indexOf(el);
      const order = ["msH","msT","msO"];
      return order[idx] ?? null;
    }
    if(digitDisplay.contains(el)){
      const cells = Array.from(digitDisplay.children).filter(c => c.classList.contains("digit"));
      const idx = cells.indexOf(el);
      const order = currentSlotOrder();
      return order[idx] ?? null;
    }
    return null;
  }

  let activeDigitEl = null;
  let activeSlot = null;
  let pointerDragging = false;
  let pointerStartX = 0;
  let pointerStartY = 0;
  let pointerStepX = 0;
  let pointerStepY = 0;

  // Must match the CSS media query that triggers the forced-landscape rotation
  // (see "force landscape on mobile" block). When that rotation is active,
  // physical touch X/Y are rotated 90° relative to what the user sees, so the
  // swipe gesture has to be read off the opposite screen axis.
  function isRotatedLayout(){
    return window.matchMedia("(max-width: 900px) and (orientation: portrait)").matches;
  }

  timerRow.addEventListener("pointerdown", (e) => {
    if(running) return; // only settable while paused/idle, not mid-session
    if(finished){
      finished = false;
      digits = msToDigits(DURATIONS[mode]);
      remainingMs = DURATIONS[mode];
      updateDisplay(); // rebuild real digits before figuring out what was pressed
    }
    const target = (document.elementFromPoint(e.clientX, e.clientY) || e.target).closest(".digit");
    if(!target) return;
    const slot = slotForDigitCell(target);
    if(slot == null) return;

    activeDigitEl = target;
    activeSlot = slot;
    pointerDragging = false;
    pointerStartX = e.clientX;
    pointerStartY = e.clientY;
    pointerStepX = e.clientX;
    pointerStepY = e.clientY;
    activeDigitEl.classList.add("digit-active");
    getAudioCtx(); // unlock audio on the same user gesture
  });

  timerRow.addEventListener("pointermove", (e) => {
    if(!activeDigitEl || activeSlot == null) return;

    if(isRotatedLayout()){
      // rotated view: visual "up/down" swipe reads as physical left/right
      const totalDx = e.clientX - pointerStartX;
      if(Math.abs(totalDx) > 6) pointerDragging = true;

      const dx = e.clientX - pointerStepX;
      if(Math.abs(dx) >= SWIPE_STEP_PX){
        const steps = Math.trunc(dx / SWIPE_STEP_PX);
        // swiping physically right = visually "up" = increases
        adjustDigitSlot(activeSlot, steps);
        pointerStepX += steps * SWIPE_STEP_PX;
      }
      return;
    }

    const totalDy = e.clientY - pointerStartY;
    if(Math.abs(totalDy) > 6) pointerDragging = true;

    const dy = e.clientY - pointerStepY;
    if(Math.abs(dy) >= SWIPE_STEP_PX){
      const steps = Math.trunc(dy / SWIPE_STEP_PX);
      // swiping up (negative dy) increases, swiping down decreases
      adjustDigitSlot(activeSlot, -steps);
      pointerStepY += steps * SWIPE_STEP_PX;
    }
  });

  function endDigitPointer(){
    if(activeDigitEl) activeDigitEl.classList.remove("digit-active");
    activeDigitEl = null;
    activeSlot = null;
  }
  timerRow.addEventListener("pointerup", endDigitPointer);
  timerRow.addEventListener("pointercancel", endDigitPointer);
  timerRow.addEventListener("pointerleave", endDigitPointer);

  // tap/click anywhere on the card toggles start/pause; double-tap records
  // a lap marker while running (or just starts, if idle); triple-tap resets
  // every digit to 00 (stops the session first if one is running). Every tap
  // waits out this window before acting, since we can't know if another tap
  // is coming -- a small, standard trade-off for supporting all three.
  const TAP_WINDOW_MS = 300;
  let tapCount = 0;
  let tapTimer = null;

  function handleDoubleTap(){
    if(running){
      recordLap();
    } else {
      toggleTimer();
    }
  }

  function resetAllToZero(){
    if(running){
      running = false;
      stopEngine();
      releaseWakeLock();
    }
    finished = false;
    digits = { hT:0, hO:0, mT:0, mO:0, sT:0, sO:0, msH:0, msT:0, msO:0 };
    remainingMs = 0;
    DURATIONS[mode] = 0;
    clearSession(); // new (zero) duration configured: laps clear, mode re-decided next start
    updateDisplay();
    playTick(-1);
  }

  card.addEventListener("click", (e) => {
    if(pointerDragging){ pointerDragging = false; return; }
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => {
      const count = tapCount;
      tapCount = 0;
      if(count === 1) toggleTimer();
      else if(count === 2) handleDoubleTap();
      else if(count >= 3) resetAllToZero();
    }, TAP_WINDOW_MS);
  });

  document.addEventListener("keydown", (e) => {
    if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if(e.key === " "){ e.preventDefault(); toggleTimer(); }
    if(e.key === "l" || e.key === "L"){ e.preventDefault(); if(running) recordLap(); }
    if(e.key === "r" || e.key === "R"){ e.preventDefault(); resetAllToZero(); }
    if(running) return;
    if(e.key === "ArrowUp"){ e.preventDefault(); adjustDigitSlot("mO", 1); }
    if(e.key === "ArrowDown"){ e.preventDefault(); adjustDigitSlot("mO", -1); }
  });

  renderMsDigits("000");
  updateDisplay();
  fitTimerToScreen();
  syncProgressTrackWidth();
  requestAnimationFrame(scheduleFit);
  setTimeout(scheduleFit, 100);
  // fonts loading late can change natural glyph size after first paint
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(scheduleFit);
  }
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
